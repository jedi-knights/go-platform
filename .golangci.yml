version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - dupl
    - errcheck
    - gocognit
    - goconst
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    cyclop:
      max-complexity: 7
    gocyclo:
      min-complexity: 7
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 3
    govet:
      enable-all: true
      disable:
        - fieldalignment
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - cyclop
          - gocyclo
          - goconst

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jedi-knights/go-platform
